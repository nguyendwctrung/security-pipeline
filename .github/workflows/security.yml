name: Security scan

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: security_system/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r security_system/requirements.txt

      - name: Verify PyYAML
        run: python -c "import yaml; print(yaml.__version__)"

      - name: Run security pipeline
        run: python -m security_system.main
