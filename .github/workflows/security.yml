name: Security scan

on:
  workflow_dispatch:

  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  security-scan:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run security pipeline
        run: python -m security_system.main
